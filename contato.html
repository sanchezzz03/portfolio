<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato - Lucas Sanchez Vicente</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>
<body>

    <nav>
        <div class="nav-container">
            <a href="index.html" class="logo">Lucas</a>
            
            <div class="nav-links" id="nav-links">
                <a href="index.html">Sobre Mim</a>
                <a href="formacao.html">Formação</a>
                <a href="portfolio.html">Portfólio</a>
                <a href="contato.html">Contato</a>
            </div>

            <div style="display: flex; align-items: center; gap: 16px;">
                <!-- Botão Dark Mode -->
                <button onclick="toggleTema()" 
                        style="background: none; border: none; font-size: 1.5rem; cursor: pointer; padding: 8px; border-radius: 50%; color: #94a3b8;"
                        title="Alternar tema">
                    <i class="fas fa-moon" id="theme-icon"></i>
                </button>

                <a href="contato.html" class="btn-contact">Entrar em contato</a>
            </div>
        </div>
    </nav>

    <main style="padding-top: 100px; padding-bottom: 120px; max-width: 1100px; margin: 0 auto; padding-left: 24px; padding-right: 24px;">
        <h1 style="font-size: 3.2rem; text-align: center; margin-bottom: 20px;">Vamos conversar?</h1>
        <p style="text-align: center; font-size: 1.25rem; color: #52525b; margin-bottom: 60px;">
            Estou aberto a novas oportunidades e colaborações!
        </p>

        <form id="form-contato" onsubmit="return handleSubmit(event)" class="form-card"
            style="background: white; padding: 48px; border-radius: 24px; box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1);">
            
            <div style="margin-bottom: 24px;">
                <label style="display: block; margin-bottom: 8px; font-weight: 500;">Nome completo</label>
                <input type="text" id="nome" required 
                    style="width: 100%; padding: 16px; border: 2px solid #e4e4e7; border-radius: 12px; font-size: 1.1rem;">
            </div>

            <div style="margin-bottom: 24px;">
                <label style="display: block; margin-bottom: 8px; font-weight: 500;">E-mail</label>
                <input type="email" id="email" required 
                    style="width: 100%; padding: 16px; border: 2px solid #e4e4e7; border-radius: 12px; font-size: 1.1rem;">
            </div>

            <div style="margin-bottom: 32px;">
                <label style="display: block; margin-bottom: 8px; font-weight: 500;">Mensagem</label>
                <textarea id="mensagem" rows="6" required 
                        style="width: 100%; padding: 16px; border: 2px solid #e4e4e7; border-radius: 12px; font-size: 1.1rem; resize: vertical;"></textarea>
            </div>

            <button type="submit" 
                    style="width: 100%; padding: 18px; background: #2563eb; color: white; border: none; border-radius: 9999px; font-size: 1.2rem; font-weight: 600; cursor: pointer;">
                Enviar Mensagem
            </button>
        </form>
    </main>

    <!-- RODAPÉ -->
    <footer>
        <div class="footer-content">
            <div>
                <span class="logo" style="color: white; font-size: 22px;">Lucas</span>
                <span style="margin-left: 12px; color: #71717a;">© 2026</span>
            </div>
            
            <div>
                <a href="index.html">Sobre Mim</a>
                <a href="formacao.html">Formação</a>
                <a href="portfolio.html">Portfólio</a>
                <a href="contato.html">Contato</a>
            </div>
            
            <div>
                <a href="https://br.linkedin.com/in/lucas-sanchez-vicente-836632349" target="_blank">
                    <i class="fab fa-linkedin fa-lg"></i>
                </a>
                <a href="https://github.com/sanchezzz03" target="_blank" style="margin-left: 24px;">
                    <i class="fab fa-github fa-lg"></i>
                </a>
            </div>
        </div>
    </footer>

    <script src="script.js"></script>
    <script>
        function handleSubmit(e) {
            e.preventDefault();
            if (validarFormulario()) {
                const form = document.getElementById("form-contato");
                simularEnvioFormulario(form);
            }
        }
    </script>
</body>
</html>
